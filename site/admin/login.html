<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenEye AI — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family: 'Inter', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #1e2420 0%, #2c352a 100%); display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-card { background: white; border-radius: 32px; padding: 40px 32px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
    .logo { font-size: 2rem; font-weight: 700; color: #7a9e3f; margin-bottom: 8px; }
    .title { font-size: 1.3rem; font-weight: 600; margin-bottom: 24px; color: #333; }
    input { width: 100%; padding: 14px 16px; border: 1.5px solid #e0e0e0; border-radius: 16px; font-size: 1rem; margin-bottom: 16px; }
    input:focus { outline: none; border-color: #7a9e3f; }
    button { width: 100%; background: #7a9e3f; color: white; border: none; border-radius: 16px; padding: 14px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .error { color: #e74c3c; font-size: 0.85rem; margin-top: 12px; display: none; }
    .back-link { margin-top: 20px; display: block; color: #7a9e3f; text-decoration: none; }
  </style>
</head>
<body>
<div class="login-card">
  <div class="logo"><i class="fas fa-leaf"></i> GreenEye AI</div>
  <div class="title">Вход для администратора</div>
  <input type="text" id="username" placeholder="Логин" autocomplete="off">
  <input type="password" id="password" placeholder="Пароль" autocomplete="off">
  <button id="loginBtn">Войти</button>
  <div class="error" id="errorMsg">Неверный логин или пароль</div>
  <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> На главную</a>
</div>
<script>
  const btn = document.getElementById('loginBtn');
  const errorDiv = document.getElementById('errorMsg');

  btn.onclick = async () => {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();

    // Скрываем ошибку перед новой попыткой
    errorDiv.style.display = 'none';

    try {
      const response = await fetch('/api/admin/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        const data = await response.json();
        const token = data.token; // Предполагаем, что сервер возвращает { "token": "..." }
        const expires_in = data.expires_in;

        // 1. Сохраняем токен в Cookies (срок действия 1 день)
        document.cookie = `token=${token}; path=/; max-age=${expires_in}; SameSite=Strict`;

        // 2. Опционально сохраняем флаг в sessionStorage для старой логики
        sessionStorage.setItem('admin_logged', 'true');

        // 3. Перенаправляем в панель управления
        window.location.href = '/admin';
      } else {
        // Если сервер вернул 401 или другую ошибку
        errorDiv.textContent = 'Неверный логин или пароль';
        errorDiv.style.display = 'block';
      }
    } catch (err) {
      console.error('Ошибка сети:', err);
      errorDiv.textContent = 'Ошибка сервера. Попробуйте позже.';
      errorDiv.style.display = 'block';
    }
  };
</script>
</body>
</html>
