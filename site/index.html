<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenEye AI — Мониторинг (витрина)</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <button class="burger"><span></span><span></span><span></span></button>
    <div class="overlay"></div>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo"><i></i> GreenEye AI</div>
            <nav class="nav">
                <div class="nav-item active"><i></i> Дашборд</div>
                <div class="nav-item"><i></i> Полки</div>
                <div class="nav-item"><i></i> Вода</div>
                <div class="nav-item"><i></i> Свет</div>
                <div class="nav-item"><i></i> Заболевания</div>
            </nav>
            <div class="sidebar-bottom">
                <a href="/admin/login" class="admin-link"><i></i> Вход для админа</a>
            </div>
        </aside>
        <main class="main">
            <div class="content">
                <!-- ГЛАВНАЯ СЕКЦИЯ (ДАШБОРД) -->
                <section id="dashboard" class="section active-section">
                    <div class="dashboard-grid">
                        
                        <!-- Карточка Вода -->
                        <div class="card">
                            <div class="card-header"><i></i> Полив</div>
                            <div class="sensor-value" id="water-status">--</div>
                            <div class="badge badge-danger" id="water-badge">OFF</div>
                            <canvas id="water-chart"></canvas>
                        </div>

                        <!-- Карточка Свет -->
                        <div class="card">
                            <div class="card-header"><i>💡</i> Свет</div>
                            <div class="sensor-value" id="light-status">--</div>
                            <div class="badge badge-danger" id="light-badge">OFF</div>
                            <canvas id="light-chart"></canvas>
                        </div>

                        <!-- Карточка Вентиляция -->
                        <div class="card">
                            <div class="card-header"><i>🌬️</i> Вентиляция</div>
                            <div class="sensor-value" id="fan-status">--</div>
                            <div class="badge badge-danger" id="fan-badge">OFF</div>
                            <canvas id="fan-chart"></canvas>
                        </div>

                    </div>
                </section>

                <!-- ОСТАЛЬНЫЕ СЕКЦИИ -->
                <section id="shelves" class="section"></section>
                <section id="water" class="section">Уровень воды (история)</section>
                <section id="light" class="section">Состояние освещения</section>
                <section id="diseases" class="section"></section>
            </div>
        </main>
    </div>
    
    <!-- Подключение скриптов -->
    <script src="/api.js"></script>
    <script src="/index.js"></script>
</body>
</html>
