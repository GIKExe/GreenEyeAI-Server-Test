<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenEye AI — Админ панель</title>
    <link rel="stylesheet" href="/index.css">
</head>
<body>
    <button class="burger"><span></span><span></span><span></span></button>
    <div class="overlay"></div>
    <div class="app">
        <aside class="sidebar">
            <div class="sidebar-logo"><i></i> GreenEye AI Admin</div>
            <nav class="nav">
                <div class="nav-item active"><i></i> Дашборд</div>
                <div class="nav-item"><i></i> Полки</div>
                <div class="nav-item"><i></i> Управление</div>
                <div class="nav-item"><i></i> Заболевания</div>
            </nav>
            <div class="sidebar-bottom">
                <div class="nav-item"><i></i> Камеры</div>
            </div>
        </aside>
        <main class="main">
            <div class="content">
                <h1>Управление системой</h1>
                
                <!-- СЕТКА КАРТОЧЕК (использует стили из index.css) -->
                <div class="dashboard-grid">
                    
                    <!-- Блок управления устройствами -->
                    <div class="card">
                        <h3>Устройства</h3>
                        <label><input type="checkbox" id="water-toggle"> Полив</label><br><br>
                        <label><input type="checkbox" id="light-toggle"> Свет</label><br><br>
                        <label><input type="checkbox" id="fan-toggle"> Вентиляция</label>
                    </div>

                    <!-- Блок режима -->
                    <div class="card">
                        <h3>Режим работы</h3>
                        <label><input type="radio" name="mode" value="auto"> Автоматический</label><br><br>
                        <label><input type="radio" name="mode" value="manual"> Ручной</label>
                    </div>

                    <!-- Блок расписания -->
                    <div class="card">
                        <h3>Расписание</h3>
                        <p style="margin: 8px 0 4px; font-weight: 500;">Свет:</p>
                        <input type="time" id="light-start"> - <input type="time" id="light-end"><br><br>
                        
                        <p style="margin: 8px 0 4px; font-weight: 500;">Полив:</p>
                        интервал <input type="number" id="water-interval" style="width: 50px;"> ч, 
                        длительность <input type="number" id="water-duration" style="width: 50px;"> мин<br><br>
                        
                        <p style="margin: 8px 0 4px; font-weight: 500;">Вентиляция:</p>
                        интервал <input type="number" id="fan-interval" style="width: 50px;"> ч, 
                        длительность <input type="number" id="fan-duration" style="width: 50px;"> мин<br><br>
                        
                        <button id="save-schedule" style="margin-top: 10px; padding: 10px 16px; background: #7fc950; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">Сохранить расписание</button>
                    </div>
                    
                </div>

                <button id="logout-btn" style="margin-top: 24px; padding: 10px 20px; background: #ff4444; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 500;">Выйти</button>
            </div>
        </main>
    </div>
    
    <!-- Скрипты подключаются в самом конце для ускорения загрузки -->
    <script src="/api.js"></script>
    <script src="/admin.js"></script>
</body>
</html>
