<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GreenEye AI — Админ панель</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 0; background: #f4f6f9; color: #2c3e50; }
    header { background: #34495e; color: #fff; padding: 1rem; display: flex; justify-content: space-between; align-items: center; }
    nav a { color: #ecf0f1; margin-left: 15px; text-decoration: none; }
    .container { max-width: 900px; margin: 20px auto; padding: 0 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .card { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
    .card h3 { margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    .control-group { margin-bottom: 15px; }
    .btn { padding: 8px 14px; border: none; border-radius: 5px; cursor: pointer; font-weight: 500; color: #fff; }
    .btn-on { background: #27ae60; } .btn-off { background: #95a5a6; } .btn-save { background: #2980b9; width: 100%; margin-top: 10px; }
    .btn:hover { opacity: 0.9; }
    input, select { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    #logout { background: #c0392b; color: #fff; padding: 6px 12px; border-radius: 4px; cursor: pointer; border: none; }
    .log { background: #f8f9fa; padding: 10px; border-radius: 4px; font-family: monospace; font-size: 0.85rem; max-height: 100px; overflow-y: auto; }
  </style>
</head>
<body>
  <header>
    <h2>GreenEye AI Admin</h2>
    <nav>
      <a href="/">Дашборд</a>
      <button id="logout">Выйти</button>
    </nav>
  </header>

  <div class="container">
    <!-- Управление реле -->
    <section class="card">
      <h3>Управление оборудованием</h3>
      <div class="control-group">
        <label>💧 Полив</label>
        <button class="btn btn-off" onclick="toggleRelay('water', this)">OFF</button>
      </div>
      <div class="control-group">
        <label>💡 Освещение</label>
        <button class="btn btn-off" onclick="toggleRelay('light', this)">OFF</button>
      </div>
      <div class="control-group">
        <label>🌀 Вентилятор</label>
        <button class="btn btn-off" onclick="toggleRelay('fan', this)">OFF</button>
      </div>
    </section>

    <!-- Режим и расписание -->
    <section class="card">
      <h3>Настройки системы</h3>
      <div class="control-group">
        <label>Режим работы</label>
        <select id="modeSelect">
          <option value="auto">Автоматический</option>
          <option value="manual">Ручной</option>
        </select>
        <button class="btn btn-save" onclick="setMode()">Применить режим</button>
      </div>
      <h4 style="margin-bottom:5px;">Расписание</h4>
      <input type="text" id="sched-light" placeholder="Свет: 08:00-20:00">
      <input type="number" id="sched-water-int" placeholder="Полив интервал (ч)" style="margin-top:5px">
      <input type="number" id="sched-water-dur" placeholder="Полив длительность (мин)">
      <button class="btn btn-save" onclick="saveSchedule()">Сохранить расписание</button>
    </section>

    <!-- Лог действий -->
    <section class="card" style="grid-column: span 2;">
      <h3>Лог операций</h3>
      <div id="action-log" class="log">Ожидание действий...</div>
    </section>
  </div>

  <script>
    const TOKEN = localStorage.getItem('adminToken');
    const logEl = document.getElementById('action-log');
    function log(msg) { logEl.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}<br>` + logEl.innerHTML; }

    // Загрузка текущих состояний
    async function loadAdminState() {
      try {
        const res = await fetch('/api/command/mode');
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        const mode = await res.json();
        document.getElementById('modeSelect').value = mode.mode;
      } catch (e) {
        log('Ошибка загрузки режима: ' + e.message);
      }

      try {
        const res = await fetch('/api/last_state');
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        const state = await res.json();

        // Обновляем кнопки реле
        document.querySelectorAll('.btn-on, .btn-off').forEach(btn => {
          const device = btn.onclick.toString().match(/'(water|light|fan)'/)?.[1];
          if (device) {
            btn.textContent = state[device] ? 'ON' : 'OFF';
            btn.className = `btn ${state[device] ? 'btn-on' : 'btn-off'}`;
          }
        });
      } catch (e) {
        log('Ошибка загрузки состояния: ' + e.message);
      }

      try {
        const res = await fetch('/api/schedule');
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}: ${res.statusText}`);
        }
        const sched = await res.json();

        // Заполняем форму расписания
        document.getElementById('sched-light').value = `${sched.light.start} - ${sched.light.end}`;
        document.getElementById('sched-water-int').value = sched.water.interval_hours;
        document.getElementById('sched-water-dur').value = sched.water.duration_minutes;
      } catch (e) {
        log('Ошибка загрузки расписания: ' + e.message);
      }
    }

    // ✅ 2.2-4 Управление реле
    async function toggleRelay(device, btn) {
      const currentState = btn.textContent === 'ON' ? 'off' : 'on';
      try {
        const res = await fetch(`/api/command/${device}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, state: currentState })
        });
        if (res.ok) {
          btn.textContent = currentState.toUpperCase();
          btn.className = `btn ${currentState === 'on' ? 'btn-on' : 'btn-off'}`;
          log(`✅ Реле ${device} → ${currentState}`);
        } else { log(`❌ Ошибка управления ${device}`); }
      } catch (e) { log(`❌ Сеть: ${e.message}`); }
    }

    // ✅ 2.5 Установка режима
    async function setMode() {
      const mode = document.getElementById('modeSelect').value;
      try {
        const res = await fetch('/api/command/mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: TOKEN, mode })
        });
        if (res.ok) log(`✅ Режим изменён на ${mode}`);
        else log(`❌ Ошибка смены режима`);
      } catch (e) { log(`❌ Сеть: ${e.message}`); }
    }

    // ✅ 2.6 Сохранение расписаний
    async function saveSchedule() {
      const lightStr = document.getElementById('sched-light').value.split('-').map(s => s.trim());
      try {
        const payload = {
          token: TOKEN,
          light: { start: lightStr[0], end: lightStr[1] || '20:00' },
          fan: { interval_hours: 2, duration_minutes: 5 }, // Берём дефолт или можно добавить поля
          water: { 
            interval_hours: Number(document.getElementById('sched-water-int').value), 
            duration_minutes: Number(document.getElementById('sched-water-dur').value) 
          }
        };
        const res = await fetch('/api/schedule', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        if (res.ok) log('✅ Расписание сохранено');
        else log('❌ Ошибка сохранения расписания');
      } catch (e) { log(`❌ Сеть: ${e.message}`); }
    }

    document.getElementById('logout').addEventListener('click', () => {
      document.cookie = 'token=; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT';
      localStorage.removeItem('adminToken');
      window.location.href = '/admin/login';
    });

    loadAdminState();
    setInterval(loadAdminState, 10000);
  </script>
</body>
</html>
