<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GreenEye AI — Админ панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f0f2ee; min-height: 100vh; }
    .burger { position: fixed; top: 16px; left: 16px; z-index: 1001; background: #1e2420; border: none; border-radius: 12px; width: 44px; height: 44px; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; }
    .burger span { display: block; width: 24px; height: 2px; background: #7fc950; border-radius: 2px; transition: 0.2s; }
    .burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .overlay.active { display: block; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1e2420; display: flex; flex-direction: column; justify-content: space-between; padding: 24px 16px; flex-shrink: 0; transition: transform 0.3s ease; z-index: 1000; }
    @media (max-width: 768px) { .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); z-index: 1000; } .sidebar.open { transform: translateX(0); } .burger { display: flex; } .content { padding-top: 70px !important; } }
    .sidebar-logo { font-size: 1.2rem; font-weight: 700; color: #7fc950; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
    .nav { display: flex; flex-direction: column; gap: 6px; }
    .nav-item { padding: 12px 16px; border-radius: 12px; color: #8fa888; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .nav-item i { width: 22px; }
    .nav-item:hover, .nav-item.active { background: #3a4e34; color: #a8d87e; }
    .logout-btn { background: #2c352a; color: #a8d87e; border: none; border-radius: 12px; padding: 12px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
    .main { flex: 1; background: #f0f2ee; }
    .content { padding: 24px; }
    .dashboard-grid, .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .card-header i { font-size: 28px; color: #7a9e3f; }
    .sensor-value { font-size: 2rem; font-weight: 700; margin: 8px 0; }
    .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .progress-fill { height: 100%; background: #7a9e3f; border-radius: 10px; transition: width 0.3s; }
    .toggle-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 8px 0; }
    .toggle-label { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .switch { position: relative; display: inline-block; width: 52px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #bbb; border-radius: 34px; cursor: pointer; transition: 0.2s; }
    .slider:before { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    input:checked + .slider { background: #7a9e3f; }
    input:checked + .slider:before { transform: translateX(24px); }
    button.icon-btn { background: #f0f2ee; border: none; padding: 10px 16px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.2s; }
    button.icon-btn:hover { background: #e0e4dc; }
    .schedule-item { background: #f7f9f5; border-radius: 16px; padding: 12px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .time-inputs { display: flex; gap: 12px; align-items: center; }
    .remove-schedule { background: none; border: none; color: #c0392b; cursor: pointer; font-size: 1.2rem; }
    .shelf-row { background: #fff; border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .badge { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: #d6edbe; color: #4a7c20; }
    .badge-danger { background: #ffd0cc; color: #b03020; }
    .delete-btn { background: none; border: 1px solid #ffb3b3; color: #c0392b; border-radius: 30px; padding: 6px 14px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
    .cameras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
    .camera-card { background: #2c352a; border-radius: 16px; padding: 16px; text-align: center; color: #8fa888; }
    .camera-card i { font-size: 32px; margin-bottom: 8px; }
    .chart-row { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .chart-card { flex: 1; min-width: 250px; }
    .manual-buttons { display: flex; gap: 12px; margin-top: 12px; margin-bottom: 16px; }
    @media (max-width: 480px) { .content { padding: 16px; padding-top: 70px; } .shelf-row { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
<button class="burger" id="burgerBtn"><span></span><span></span><span></span></button>
<div class="overlay" id="overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="sidebar-logo"><i class="fas fa-leaf"></i> GreenEye AI Admin</div>
      <nav class="nav">
        <div class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Дашборд</div>
        <div class="nav-item" data-section="shelves"><i class="fas fa-layer-group"></i> Полки</div>
        <div class="nav-item" data-section="control"><i class="fas fa-sliders-h"></i> Управление</div>
        <div class="nav-item" data-section="diseases"><i class="fas fa-bug"></i> Заболевания</div>
      </nav>
    </div>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
  </aside>
  <div class="main">
    <div class="content" id="mainContent"></div>
    <div style="padding:0 24px 24px 24px"><h3><i class="fas fa-video"></i> Камеры</h3><div class="cameras-grid" id="camerasGrid"></div></div>
  </div>
</div>
<script>
  // ========== СОСТОЯНИЕ ==========
  let state = {
    waterAuto: true,
    lightAuto: true,
    waterActive: false,
    lightActive: false,
    waterLevel: 80,
    fan: false
  };
  let plants = [];
  let nextId = 1;
  let waterSchedule = [];
  let lightSchedule = [];
  let historyLog = [];

  let charts = { waterLevel: null, waterActive: null, lightActive: null };
  let boostTimer = null;

  // ========== ЗАГРУЗКА / СОХРАНЕНИЕ ==========
  function loadData() {
    const storedPlants = localStorage.getItem('greeneye_plants');
    if(storedPlants) {
      plants = JSON.parse(storedPlants);
      nextId = plants.length ? Math.max(...plants.map(p=>p.id)) + 1 : 1;
    } else {
      plants = [
        { id:1, name:'Растение #1', shelf:'Стеллаж A', status:'success', statusText:'Здоров' },
        { id:2, name:'Растение #2', shelf:'Стеллаж B', status:'danger', statusText:'Болен' }
      ];
      nextId = 3;
    }
    const storedState = localStorage.getItem('greeneye_state');
    if(storedState) {
      const s = JSON.parse(storedState);
      state = { ...state, ...s };
    }
    const storedWaterSchedule = localStorage.getItem('greeneye_waterSchedule');
    if(storedWaterSchedule) waterSchedule = JSON.parse(storedWaterSchedule);
    else waterSchedule = [{ start: "08:00", end: "20:00" }];
    
    const storedLightSchedule = localStorage.getItem('greeneye_lightSchedule');
    if(storedLightSchedule) lightSchedule = JSON.parse(storedLightSchedule);
    else lightSchedule = [{ start: "07:00", end: "21:00" }];
    
    const storedHistory = localStorage.getItem('greeneye_history');
    if(storedHistory) historyLog = JSON.parse(storedHistory);
    else {
      const now = Date.now();
      historyLog = [];
      for(let i=9; i>=0; i--) {
        historyLog.push({
          timestamp: now - i*3600000,
          waterLevel: 70 + Math.floor(Math.random()*20),
          waterActive: i%2===0,
          lightActive: i%3===0
        });
      }
      saveHistory();
    }
  }
  function savePlants() { localStorage.setItem('greeneye_plants', JSON.stringify(plants)); }
  function saveState() { localStorage.setItem('greeneye_state', JSON.stringify({ waterAuto: state.waterAuto, lightAuto: state.lightAuto, waterActive: state.waterActive, lightActive: state.lightActive, waterLevel: state.waterLevel, fan: state.fan })); }
  function saveSchedules() { localStorage.setItem('greeneye_waterSchedule', JSON.stringify(waterSchedule)); localStorage.setItem('greeneye_lightSchedule', JSON.stringify(lightSchedule)); }
  function saveHistory() { localStorage.setItem('greeneye_history', JSON.stringify(historyLog.slice(-50))); }

  function addHistoryEvent(extra = {}) {
    historyLog.push({
      timestamp: Date.now(),
      waterLevel: state.waterLevel,
      waterActive: state.waterActive,
      lightActive: state.lightActive,
      ...extra
    });
    if(historyLog.length > 50) historyLog.shift();
    saveHistory();
    if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard' || 
       document.querySelector('.nav-item.active')?.dataset.section === 'control') {
      updateAllCharts();
    }
  }

  // ========== РАСПИСАНИЕ (ИСПРАВЛЕННАЯ ЛОГИКА) ==========
  function isTimeInRange(now, start, end) {
    const current = now.getHours() * 60 + now.getMinutes();
    const [startH, startM] = start.split(':').map(Number);
    const [endH, endM] = end.split(':').map(Number);
    const startMinutes = startH * 60 + startM;
    let endMinutes = endH * 60 + endM;
    if (endMinutes <= startMinutes) endMinutes += 24*60;
    let cur = current;
    if (cur < startMinutes) cur += 24*60;
    return cur >= startMinutes && cur < endMinutes;
  }

  function updateActuatorsFromSchedule() {
    if (boostTimer) return;
    const now = new Date();
    // Если авторежим выключен, оставляем текущее состояние
    let newWaterActive = state.waterActive;
    let newLightActive = state.lightActive;
    if (state.waterAuto) {
      newWaterActive = waterSchedule.some(sch => isTimeInRange(now, sch.start, sch.end));
    }
    if (state.lightAuto) {
      newLightActive = lightSchedule.some(sch => isTimeInRange(now, sch.start, sch.end));
    }
    let changed = false;
    if (state.waterActive !== newWaterActive) {
      state.waterActive = newWaterActive;
      changed = true;
    }
    if (state.lightActive !== newLightActive) {
      state.lightActive = newLightActive;
      changed = true;
    }
    if (changed) {
      saveState();
      addHistoryEvent({ source: 'schedule' });
      if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard') updateDashboardStats();
      if(document.querySelector('.nav-item.active')?.dataset.section === 'control') updateControlStats();
      updateAllCharts();
    }
  }

  // ========== ОБНОВЛЕНИЕ КАРТОЧЕК ==========
  function updateDashboardStats() {
    const statsDiv = document.getElementById('dashboardStats');
    if(statsDiv) {
      statsDiv.innerHTML = `
        <div class="card"><div class="card-header"><i class="fas fa-water"></i><h3>Уровень воды</h3></div><div class="sensor-value">${state.waterLevel}%</div><div class="progress-bar"><div class="progress-fill" style="width:${state.waterLevel}%"></div></div></div>
        <div class="card"><div class="card-header"><i class="fas fa-tint"></i><h3>Полив</h3></div><div class="sensor-value">${state.waterActive ? '🔵 ВКЛ' : '⚪ ВЫКЛ'}</div><div>Режим: ${state.waterAuto ? 'Авто' : 'Ручной'}</div></div>
        <div class="card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Освещение</h3></div><div class="sensor-value">${state.lightActive ? '💡 ВКЛ' : '🌙 ВЫКЛ'}</div><div>Режим: ${state.lightAuto ? 'Авто' : 'Ручной'}</div><div><i class="fas fa-fan"></i> Вентилятор: ${state.fan ? 'Вкл' : 'Выкл'}</div></div>
      `;
    }
  }

  function updateControlStats() {
    const statsDiv = document.getElementById('controlStats');
    if(statsDiv) {
      statsDiv.innerHTML = `
        <div class="card"><div class="card-header"><i class="fas fa-water"></i><h3>Уровень воды</h3></div><div class="sensor-value">${state.waterLevel}%</div><div class="progress-bar"><div class="progress-fill" style="width:${state.waterLevel}%"></div></div></div>
        <div class="card"><div class="card-header"><i class="fas fa-tint"></i><h3>Полив (текущее)</h3></div><div class="sensor-value">${state.waterActive ? '🔵 ВКЛ' : '⚪ ВЫКЛ'}</div><div>Режим: ${state.waterAuto ? 'Авто' : 'Ручной'}</div></div>
        <div class="card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Освещение (текущее)</h3></div><div class="sensor-value">${state.lightActive ? '💡 ВКЛ' : '🌙 ВЫКЛ'}</div><div>Режим: ${state.lightAuto ? 'Авто' : 'Ручной'}</div><div><i class="fas fa-fan"></i> Вентилятор: ${state.fan ? 'Вкл' : 'Выкл'}</div></div>
      `;
    }
  }

  // ========== ГРАФИКИ ==========
  function renderWaterLevelChart(containerId = 'waterLevelChart') {
    const canvas = document.getElementById(containerId);
    if(!canvas) return;
    if(charts.waterLevel) charts.waterLevel.destroy();
    const labels = historyLog.map(e => new Date(e.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
    const data = historyLog.map(e => e.waterLevel);
    charts.waterLevel = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Уровень воды (%)', data, borderColor: '#7a9e3f', backgroundColor: 'rgba(122,158,63,0.1)', tension: 0.2, fill: true }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: 0, max: 100 } } }
    });
  }
  function renderWaterActiveChart(containerId = 'waterActiveChart') {
    const canvas = document.getElementById(containerId);
    if(!canvas) return;
    if(charts.waterActive) charts.waterActive.destroy();
    const labels = historyLog.map(e => new Date(e.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
    const data = historyLog.map(e => e.waterActive ? 1 : 0);
    charts.waterActive = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Полив (1=вкл, 0=выкл)', data, borderColor: '#3498db', backgroundColor: 'rgba(52,152,219,0.1)', stepped: true, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: -0.1, max: 1.1, ticks: { stepSize: 1 } } } }
    });
  }
  function renderLightActiveChart(containerId = 'lightActiveChart') {
    const canvas = document.getElementById(containerId);
    if(!canvas) return;
    if(charts.lightActive) charts.lightActive.destroy();
    const labels = historyLog.map(e => new Date(e.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}));
    const data = historyLog.map(e => e.lightActive ? 1 : 0);
    charts.lightActive = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{ label: 'Освещение (1=вкл, 0=выкл)', data, borderColor: '#f1c40f', backgroundColor: 'rgba(241,196,15,0.1)', stepped: true, borderWidth: 2 }] },
      options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: -0.1, max: 1.1, ticks: { stepSize: 1 } } } }
    });
  }
  function updateAllCharts() {
    renderWaterLevelChart('waterLevelChart');
    renderWaterActiveChart('waterActiveChart');
    renderLightActiveChart('lightActiveChart');
    renderWaterLevelChart('controlWaterLevelChart');
    renderWaterActiveChart('controlWaterActiveChart');
    renderLightActiveChart('controlLightActiveChart');
  }

  // ========== РУЧНОЕ УПРАВЛЕНИЕ ==========
  function setWaterManual(active) {
    if(boostTimer) { clearTimeout(boostTimer); boostTimer = null; }
    state.waterAuto = false;
    state.waterActive = active;
    saveState();
    addHistoryEvent({ source: 'manual_water', value: active });
    if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard') updateDashboardStats();
    if(document.querySelector('.nav-item.active')?.dataset.section === 'control') {
      updateControlStats();
      const autoToggle = document.getElementById('waterAutoToggle');
      if(autoToggle) autoToggle.checked = state.waterAuto;
    }
    updateAllCharts();
  }

  function setLightManual(active) {
    state.lightAuto = false;
    state.lightActive = active;
    saveState();
    addHistoryEvent({ source: 'manual_light', value: active });
    if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard') updateDashboardStats();
    if(document.querySelector('.nav-item.active')?.dataset.section === 'control') {
      updateControlStats();
      const autoToggle = document.getElementById('lightAutoToggle');
      if(autoToggle) autoToggle.checked = state.lightAuto;
    }
    updateAllCharts();
  }

  // ========== РЕНДЕР РАЗДЕЛОВ ==========
  function renderDashboard() {
    const html = `
      <div id="dashboardStats" class="dashboard-grid"></div>
      <div class="chart-row">
        <div class="card chart-card"><div class="card-header"><i class="fas fa-chart-line"></i><h3>Уровень воды (история)</h3></div><canvas id="waterLevelChart" height="150"></canvas></div>
        <div class="card chart-card"><div class="card-header"><i class="fas fa-tint"></i><h3>Состояние полива</h3></div><canvas id="waterActiveChart" height="150"></canvas></div>
        <div class="card chart-card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Состояние освещения</h3></div><canvas id="lightActiveChart" height="150"></canvas></div>
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
    updateDashboardStats();
    updateAllCharts();
  }

  function renderShelves() {
    const html = `<div id="shelvesList"></div><button id="addShelfBtn" style="margin-top:16px; background:#3a4e34; color:white; border:none; padding:12px 20px; border-radius:40px; cursor:pointer;"><i class="fas fa-plus"></i> Добавить полку</button>`;
    document.getElementById('mainContent').innerHTML = html;
    const list = document.getElementById('shelvesList');
    list.innerHTML = plants.map(p => `
      <div class="shelf-row"><div><strong>${escapeHtml(p.name)}</strong><br><span style="font-size:12px; color:#777">${escapeHtml(p.shelf)}</span></div><div><span class="badge badge-${p.status}">${p.statusText}</span><button class="delete-btn" data-id="${p.id}"><i class="fas fa-trash-alt"></i> Удалить</button></div></div>
    `).join('');
    document.querySelectorAll('.delete-btn').forEach(btn => btn.addEventListener('click', () => {
      plants = plants.filter(p => p.id != btn.dataset.id);
      savePlants();
      renderShelves();
      syncCameras();
      addHistoryEvent({ action: 'delete_plant' });
    }));
    document.getElementById('addShelfBtn').onclick = () => {
      let rawName = prompt('Введите название полки (уникальное):');
      if(!rawName) return;
      let name = rawName.trim();
      if(!name) return;
      if(!isPlantNameUnique(name)) {
        alert(`Ошибка: полка с именем "${name}" уже существует.`);
        return;
      }
      plants.push({ id:nextId++, name, shelf:'Новый стеллаж', status:'success', statusText:'Здоров' });
      savePlants();
      renderShelves();
      syncCameras();
      addHistoryEvent({ action: 'add_plant', plantName: name });
    };
    syncCameras();
  }

  function renderControl() {
    const waterSchedulesHtml = waterSchedule.map((sch, idx) => `
      <div class="schedule-item" data-idx="${idx}">
        <div class="time-inputs"><i class="fas fa-tint"></i> Вкл: <input type="time" class="water-start" value="${sch.start}"> Выкл: <input type="time" class="water-end" value="${sch.end}"></div>
        <button class="remove-schedule" data-type="water" data-idx="${idx}"><i class="fas fa-trash"></i></button>
      </div>
    `).join('');
    const lightSchedulesHtml = lightSchedule.map((sch, idx) => `
      <div class="schedule-item" data-idx="${idx}">
        <div class="time-inputs"><i class="fas fa-sun"></i> Вкл: <input type="time" class="light-start" value="${sch.start}"> Выкл: <input type="time" class="light-end" value="${sch.end}"></div>
        <button class="remove-schedule" data-type="light" data-idx="${idx}"><i class="fas fa-trash"></i></button>
      </div>
    `).join('');
    const html = `
      <div id="controlStats" class="dashboard-grid" style="margin-bottom:20px"></div>
      <div class="controls-grid">
        <div class="card"><div class="card-header"><i class="fas fa-tint"></i><h3>Управление поливом</h3></div>
          <div class="manual-buttons">
            <button id="waterOnBtn" class="icon-btn" style="background:#7a9e3f; color:white"><i class="fas fa-play"></i> Включить полив</button>
            <button id="waterOffBtn" class="icon-btn" style="background:#e74c3c; color:white"><i class="fas fa-stop"></i> Выключить полив</button>
          </div>
          <div class="toggle-group"><div class="toggle-label"><i class="fas fa-water"></i> Автоматический режим</div><label class="switch"><input type="checkbox" id="waterAutoToggle" ${state.waterAuto ? 'checked' : ''}><span class="slider"></span></label></div>
          <hr style="margin:16px 0">
          <div><strong><i class="far fa-calendar-alt"></i> Расписание полива (авто)</strong></div>
          <div id="waterScheduleList">${waterSchedulesHtml || '<div>Нет расписаний</div>'}</div>
          <button id="addWaterScheduleBtn" class="icon-btn" style="margin-top:12px"><i class="fas fa-plus"></i> Добавить интервал</button>
        </div>
        <div class="card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Управление освещением</h3></div>
          <div class="manual-buttons">
            <button id="lightOnBtn" class="icon-btn" style="background:#7a9e3f; color:white"><i class="fas fa-play"></i> Включить освещение</button>
            <button id="lightOffBtn" class="icon-btn" style="background:#e74c3c; color:white"><i class="fas fa-stop"></i> Выключить освещение</button>
          </div>
          <div class="toggle-group"><div class="toggle-label"><i class="fas fa-sun"></i> Автоматический режим</div><label class="switch"><input type="checkbox" id="lightAutoToggle" ${state.lightAuto ? 'checked' : ''}><span class="slider"></span></label></div>
          <div class="toggle-group"><div class="toggle-label"><i class="fas fa-fan"></i> Вентилятор</div><label class="switch"><input type="checkbox" id="fanToggle" ${state.fan ? 'checked' : ''}><span class="slider"></span></label></div>
          <hr style="margin:16px 0">
          <div><strong><i class="far fa-calendar-alt"></i> Расписание освещения (авто)</strong></div>
          <div id="lightScheduleList">${lightSchedulesHtml || '<div>Нет расписаний</div>'}</div>
          <button id="addLightScheduleBtn" class="icon-btn" style="margin-top:12px"><i class="fas fa-plus"></i> Добавить интервал</button>
        </div>
        <div class="card"><div class="card-header"><i class="fas fa-camera"></i><h3>Фото</h3></div><button id="photoBtn" class="icon-btn"><i class="fas fa-camera-retro"></i> Сделать снимок</button></div>
      </div>
      <div class="chart-row" style="margin-top:20px">
        <div class="card chart-card"><div class="card-header"><i class="fas fa-chart-line"></i><h3>Уровень воды (история)</h3></div><canvas id="controlWaterLevelChart" height="150"></canvas></div>
        <div class="card chart-card"><div class="card-header"><i class="fas fa-tint"></i><h3>Состояние полива</h3></div><canvas id="controlWaterActiveChart" height="150"></canvas></div>
        <div class="card chart-card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Состояние освещения</h3></div><canvas id="controlLightActiveChart" height="150"></canvas></div>
      </div>
    `;
    document.getElementById('mainContent').innerHTML = html;
    updateControlStats();

    // Ручное управление
    document.getElementById('waterOnBtn').onclick = () => setWaterManual(true);
    document.getElementById('waterOffBtn').onclick = () => setWaterManual(false);
    document.getElementById('lightOnBtn').onclick = () => setLightManual(true);
    document.getElementById('lightOffBtn').onclick = () => setLightManual(false);

    // Переключатели авторежима
    document.getElementById('waterAutoToggle').onchange = (e) => {
      state.waterAuto = e.target.checked;
      if(state.waterAuto) {
        if(boostTimer) clearTimeout(boostTimer);
        boostTimer = null;
        updateActuatorsFromSchedule();
      }
      saveState();
      addHistoryEvent({ source: 'toggle_water_auto', value: state.waterAuto });
      updateControlStats();
      updateDashboardStats();
      updateAllCharts();
    };
    document.getElementById('lightAutoToggle').onchange = (e) => {
      state.lightAuto = e.target.checked;
      if(state.lightAuto) updateActuatorsFromSchedule();
      saveState();
      addHistoryEvent({ source: 'toggle_light_auto', value: state.lightAuto });
      updateControlStats();
      updateDashboardStats();
      updateAllCharts();
    };
    document.getElementById('fanToggle').onchange = (e) => {
      state.fan = e.target.checked;
      saveState();
      addHistoryEvent({ fan: state.fan });
      updateControlStats();
      updateDashboardStats();
      updateAllCharts();
    };
    document.getElementById('photoBtn').onclick = () => { addHistoryEvent({ action: 'photo_captured' }); alert('Снимок сохранён'); };

    function refreshScheduleUI() { renderControl(); }
    document.getElementById('addWaterScheduleBtn').onclick = () => { waterSchedule.push({ start: "12:00", end: "13:00" }); saveSchedules(); updateActuatorsFromSchedule(); refreshScheduleUI(); };
    document.getElementById('addLightScheduleBtn').onclick = () => { lightSchedule.push({ start: "12:00", end: "13:00" }); saveSchedules(); updateActuatorsFromSchedule(); refreshScheduleUI(); };
    document.querySelectorAll('.remove-schedule').forEach(btn => {
      btn.onclick = () => {
        const type = btn.dataset.type;
        const idx = parseInt(btn.dataset.idx);
        if(type === 'water') waterSchedule.splice(idx, 1);
        else if(type === 'light') lightSchedule.splice(idx, 1);
        saveSchedules();
        updateActuatorsFromSchedule();
        refreshScheduleUI();
      };
    });
    document.querySelectorAll('.water-start, .water-end').forEach(input => {
      const parent = input.closest('.schedule-item');
      if(parent) {
        const idx = parent.dataset.idx;
        input.addEventListener('change', () => {
          const start = parent.querySelector('.water-start').value;
          const end = parent.querySelector('.water-end').value;
          if(start && end && waterSchedule[idx]) { waterSchedule[idx].start = start; waterSchedule[idx].end = end; saveSchedules(); updateActuatorsFromSchedule(); }
        });
      }
    });
    document.querySelectorAll('.light-start, .light-end').forEach(input => {
      const parent = input.closest('.schedule-item');
      if(parent) {
        const idx = parent.dataset.idx;
        input.addEventListener('change', () => {
          const start = parent.querySelector('.light-start').value;
          const end = parent.querySelector('.light-end').value;
          if(start && end && lightSchedule[idx]) { lightSchedule[idx].start = start; lightSchedule[idx].end = end; saveSchedules(); updateActuatorsFromSchedule(); }
        });
      }
    });
    updateAllCharts();
  }

  function renderDiseases() {
    const problematic = plants.filter(p => p.status === 'danger');
    const html = problematic.length ? problematic.map(p => `<div class="card" style="border-left:4px solid #e74c3c"><i class="fas fa-exclamation-triangle" style="color:#e74c3c"></i> ${escapeHtml(p.name)}: Требуется обработка</div>`).join('') : `<div class="card">✅ Все растения здоровы</div>`;
    document.getElementById('mainContent').innerHTML = html;
  }

  function syncCameras() {
    const grid = document.getElementById('camerasGrid');
    if(grid) {
      let camerasHtml = plants.slice(0, 10).map((p,idx) => `<div class="camera-card"><i class="fas fa-camera"></i><div>Камера ${idx+1}<br>${escapeHtml(p.name)}</div></div>`).join('');
      if(plants.length === 0) camerasHtml = '<div class="camera-card"><i class="fas fa-camera"></i><div>Нет камер</div></div>';
      grid.innerHTML = camerasHtml;
    }
  }

  function isPlantNameUnique(name) { return !plants.some(p => p.name.toLowerCase() === name.toLowerCase().trim()); }
  function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // ========== НАВИГАЦИЯ ==========
  const navItems = document.querySelectorAll('.nav-item');
  navItems.forEach(item => {
    item.addEventListener('click', () => {
      const section = item.dataset.section;
      navItems.forEach(n => n.classList.remove('active'));
      item.classList.add('active');
      if(section === 'dashboard') renderDashboard();
      else if(section === 'shelves') renderShelves();
      else if(section === 'control') renderControl();
      else if(section === 'diseases') renderDiseases();
      if(window.innerWidth <= 768) {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('burgerBtn').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
      }
      syncCameras();
    });
  });

  // ========== БУРГЕР, ВЫХОД, ФОНОВЫЕ ЗАДАЧИ ==========
  const burger = document.getElementById('burgerBtn'), sidebar = document.getElementById('sidebar'), overlay = document.getElementById('overlay');
  burger.onclick = () => { sidebar.classList.toggle('open'); burger.classList.toggle('open'); overlay.classList.toggle('active'); };
  overlay.onclick = () => { sidebar.classList.remove('open'); burger.classList.remove('open'); overlay.classList.remove('active'); };
  document.getElementById('logoutBtn').onclick = () => { sessionStorage.removeItem('admin_logged'); window.location='admin_login.html'; };

  function startBackgroundTasks() {
    setInterval(() => {
      let delta = (Math.random() - 0.5) * 8;
      let newLevel = state.waterLevel + delta;
      if(newLevel > 100) newLevel = 100;
      if(newLevel < 15) newLevel = 15;
      state.waterLevel = Math.floor(newLevel);
      saveState();
      addHistoryEvent({ source: 'simulation' });
      if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard') updateDashboardStats();
      if(document.querySelector('.nav-item.active')?.dataset.section === 'control') updateControlStats();
      updateAllCharts();
    }, 60000);
    
    setInterval(() => {
      updateActuatorsFromSchedule();
      if(document.querySelector('.nav-item.active')?.dataset.section === 'dashboard') updateDashboardStats();
      if(document.querySelector('.nav-item.active')?.dataset.section === 'control') updateControlStats();
      updateAllCharts();
    }, 30000);
  }

  if(!sessionStorage.getItem('admin_logged')) window.location.href = 'admin_login.html';
  loadData();
  renderDashboard();
  syncCameras();
  startBackgroundTasks();
</script>
</body>
</html>
