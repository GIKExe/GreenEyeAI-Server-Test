<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>GreenEye AI — Админ панель</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: #f0f2ee; min-height: 100vh; }
    .burger { position: fixed; top: 16px; left: 16px; z-index: 1001; background: #1e2420; border: none; border-radius: 12px; width: 44px; height: 44px; display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; cursor: pointer; }
    .burger span { display: block; width: 24px; height: 2px; background: #7fc950; border-radius: 2px; transition: 0.2s; }
    .burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .burger.open span:nth-child(2) { opacity: 0; }
    .burger.open span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }
    .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; display: none; }
    .overlay.active { display: block; }
    .app { display: flex; min-height: 100vh; }
    .sidebar { width: 260px; background: #1e2420; display: flex; flex-direction: column; justify-content: space-between; padding: 24px 16px; flex-shrink: 0; transition: transform 0.3s ease; z-index: 1000; }
    @media (max-width: 768px) { .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); z-index: 1000; } .sidebar.open { transform: translateX(0); } .burger { display: flex; } .content { padding-top: 70px !important; } }
    .sidebar-logo { font-size: 1.2rem; font-weight: 700; color: #7fc950; margin-bottom: 32px; display: flex; align-items: center; gap: 8px; }
    .nav { display: flex; flex-direction: column; gap: 6px; }
    .nav-item { padding: 12px 16px; border-radius: 12px; color: #8fa888; font-size: 0.9rem; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 12px; }
    .nav-item i { width: 22px; }
    .nav-item:hover, .nav-item.active { background: #3a4e34; color: #a8d87e; }
    .logout-btn { background: #2c352a; color: #a8d87e; border: none; border-radius: 12px; padding: 12px; width: 100%; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 20px; }
    .main { flex: 1; background: #f0f2ee; }
    .content { padding: 24px; }
    .dashboard-grid, .controls-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
    .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
    .card-header i { font-size: 28px; color: #7a9e3f; }
    .sensor-value { font-size: 2rem; font-weight: 700; margin: 8px 0; }
    .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 12px 0; }
    .progress-fill { height: 100%; background: #7a9e3f; border-radius: 10px; transition: width 0.3s; }
    .toggle-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; padding: 8px 0; }
    .toggle-label { display: flex; align-items: center; gap: 10px; font-weight: 500; }
    .switch { position: relative; display: inline-block; width: 52px; height: 28px; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #bbb; border-radius: 34px; cursor: pointer; transition: 0.2s; }
    .slider:before { content: ""; position: absolute; width: 22px; height: 22px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.2s; }
    input:checked + .slider { background: #7a9e3f; }
    input:checked + .slider:before { transform: translateX(24px); }
    button.icon-btn { background: #f0f2ee; border: none; padding: 10px 16px; border-radius: 40px; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; font-weight: 500; transition: 0.2s; }
    button.icon-btn:hover { background: #e0e4dc; }
    .schedule-item { background: #f7f9f5; border-radius: 16px; padding: 12px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
    .time-inputs { display: flex; gap: 12px; align-items: center; }
    .shelf-row { background: #fff; border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 12px; }
    .badge { padding: 6px 14px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
    .badge-success { background: #d6edbe; color: #4a7c20; }
    .badge-danger { background: #ffd0cc; color: #b03020; }
    .cameras-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
    .camera-card { background: #2c352a; border-radius: 16px; padding: 16px; text-align: center; color: #8fa888; }
    .camera-card i { font-size: 32px; margin-bottom: 8px; }
    .chart-row { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; }
    .chart-card { flex: 1; min-width: 250px; }
    .manual-buttons { display: flex; gap: 12px; margin-top: 12px; margin-bottom: 16px; }
    @media (max-width: 480px) { .content { padding: 16px; padding-top: 70px; } .shelf-row { flex-direction: column; align-items: flex-start; } }
  </style>
</head>
<body>
<button class="burger" id="burgerBtn"><span></span><span></span><span></span></button>
<div class="overlay" id="overlay"></div>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div>
      <div class="sidebar-logo"><i class="fas fa-leaf"></i> GreenEye AI Admin</div>
      <nav class="nav">
        <div class="nav-item active" data-section="dashboard"><i class="fas fa-tachometer-alt"></i> Дашборд</div>
        <div class="nav-item" data-section="shelves"><i class="fas fa-layer-group"></i> Полки</div>
        <div class="nav-item" data-section="control"><i class="fas fa-sliders-h"></i> Управление</div>
        <div class="nav-item" data-section="diseases"><i class="fas fa-bug"></i> Заболевания</div>
      </nav>
    </div>
    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Выйти</button>
  </aside>
  <div class="main">
    <div class="content" id="mainContent"></div>
    <div style="padding:0 24px 24px 24px"><h3><i class="fas fa-video"></i> Камеры</h3><div class="cameras-grid" id="camerasGrid"></div></div>
  </div>
</div>
<script>
  (() => {
    const TOKEN = sessionStorage.getItem('adminToken');
    if (!TOKEN) {
      window.location.href = 'admin/login.html';
      return;
    }

    let charts = {};

    // Улучшенная функция запроса – НЕ пытается парсить JSON для пустых ответов
    async function api(url, method = 'GET', body = null) {
      const options = {
        method,
        headers: { 'Content-Type': 'application/json' }
      };
      if (body) options.body = JSON.stringify(body);
      const res = await fetch(url, options);
      if (!res.ok) {
        let errorText = res.statusText;
        try {
          const errorJson = await res.json();
          errorText = errorJson.detail || errorJson.message || JSON.stringify(errorJson);
        } catch (e) {}
        throw new Error(`Ошибка ${res.status}: ${errorText}`);
      }
      // Для ответов без тела (или 204) просто возвращаем null
      const contentType = res.headers.get('content-type');
      if (res.status === 204 || !contentType || !contentType.includes('application/json')) {
        return null;
      }
      try {
        return await res.json();
      } catch (e) {
        // если тело не json, тоже возвращаем null
        return null;
      }
    }

    // Бургер-меню и выход
    document.getElementById('burgerBtn').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('burgerBtn').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('active');
    });
    document.getElementById('overlay').addEventListener('click', () => {
      document.getElementById('sidebar').classList.remove('open');
      document.getElementById('burgerBtn').classList.remove('open');
      document.getElementById('overlay').classList.remove('active');
    });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('adminToken');
      window.location.href = 'admin/login.html';
    });

    // Навигация
    let activeSection = 'dashboard';
    function setActiveSection(section) {
      activeSection = section;
      document.querySelectorAll('.nav-item').forEach(item => item.classList.toggle('active', item.dataset.section === section));
      renderSection(section);
    }
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        setActiveSection(item.dataset.section);
        if (window.innerWidth <= 768) {
          document.getElementById('sidebar').classList.remove('open');
          document.getElementById('burgerBtn').classList.remove('open');
          document.getElementById('overlay').classList.remove('active');
        }
      });
    });

    // ====== ДАШБОРД ======
    async function renderDashboard() {
      const container = document.getElementById('mainContent');
      container.innerHTML = `
        <div id="dashboardStats" class="dashboard-grid"></div>
        <div class="chart-row">
          <div class="card chart-card"><div class="card-header"><i class="fas fa-chart-line"></i><h3>Уровень воды (история)</h3></div><canvas id="waterLevelChart" height="150"></canvas></div>
          <div class="card chart-card"><div class="card-header"><i class="fas fa-tint"></i><h3>Состояние полива</h3></div><canvas id="waterActiveChart" height="150"></canvas></div>
          <div class="card chart-card"><div class="card-header"><i class="fas fa-lightbulb"></i><h3>Состояние освещения</h3></div><canvas id="lightActiveChart" height="150"></canvas></div>
        </div>
      `;
      await loadDashboardData();
    }

    async function loadDashboardData() {
      try {
        const [status, mode, relays] = await Promise.all([
          api('/api/status'),
          api('/api/command/mode'),
          api('/api/last_state')
        ]);
        let schedule = null;
        try { schedule = await api('/api/schedule'); } catch (e) {}

        let ph = '–';
        try {
          const phRes = await fetch('/api/ph');
          if (phRes.ok) {
            const phData = await phRes.json();
            ph = phData.ph !== undefined ? phData.ph.toFixed(1) : '–';
          }
        } catch (e) {}

        const uptimeH = Math.floor(status.uptime / 3600);
        const uptimeM = Math.floor((status.uptime % 3600) / 60);
        const scheduleHTML = schedule
          ? `Свет ${schedule.light.start}-${schedule.light.end}, вода каждые ${schedule.water.interval_hours}ч/${schedule.water.duration_minutes}мин`
          : 'Расписание недоступно';

        document.getElementById('dashboardStats').innerHTML = `
          <div class="card">
            <div class="card-header"><i class="fas fa-server"></i><h3>Система</h3></div>
            <p>Сервер: ${status.status.toUpperCase()} | БД: ${status.db_status.toUpperCase()}</p>
            <p>Режим: <strong>${mode.mode.toUpperCase()}</strong></p>
            <p>Аптайм: ${uptimeH}ч ${uptimeM}м</p>
            <p style="display:flex;align-items:center;gap:8px;"><i class="fas fa-flask" style="color:#7a9e3f;"></i> pH: ${ph}</p>
          </div>
          <div class="card">
            <div class="card-header"><i class="fas fa-plug"></i><h3>Реле</h3></div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;margin:12px 0;">
              <span class="badge ${relays.water ? 'badge-success' : 'badge-danger'}">💧 Вода ${relays.water ? 'ON' : 'OFF'}</span>
              <span class="badge ${relays.light ? 'badge-success' : 'badge-danger'}">💡 Свет ${relays.light ? 'ON' : 'OFF'}</span>
              <span class="badge ${relays.fan ? 'badge-success' : 'badge-danger'}">🌀 Вент. ${relays.fan ? 'ON' : 'OFF'}</span>
            </div>
            <p style="font-size:0.9rem;">${scheduleHTML}</p>
          </div>
        `;

        await loadCharts();
      } catch (e) {
        document.getElementById('dashboardStats').innerHTML = '<div class="card">Ошибка загрузки дашборда</div>';
        console.error(e);
      }
    }

    async function loadCharts() {
      try {
        const waterData = await api('/api/graph/table', 'POST', { table: 'water', seconds: 86400 });
        renderChart('waterLevelChart', 'line', waterData, 'Уровень воды (0/1)', '#7a9e3f');
        renderChart('waterActiveChart', 'line', waterData, 'Полив', '#3498db', true);
      } catch (e) {}
      try {
        const lightData = await api('/api/graph/table', 'POST', { table: 'light', seconds: 86400 });
        renderChart('lightActiveChart', 'line', lightData, 'Освещение', '#f1c40f', true);
      } catch (e) {}
    }

    function renderChart(canvasId, type, dataPoints, label, color, stepped = false) {
      const canvas = document.getElementById(canvasId);
      if (!canvas || !dataPoints || dataPoints.length < 2) return;
      if (charts[canvasId]) charts[canvasId].destroy();
      const labels = dataPoints.map(p => new Date(p[0] * 1000).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
      const data = dataPoints.map(p => p[1]);
      charts[canvasId] = new Chart(canvas, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label,
            data,
            borderColor: color,
            backgroundColor: color.replace(')', ',0.1)').replace('rgb', 'rgba'),
            tension: 0.2,
            fill: true,
            stepped: stepped ? 'middle' : false,
            borderWidth: 2
          }]
        },
        options: { responsive: true, maintainAspectRatio: true, scales: { y: { min: stepped ? -0.1 : undefined, max: stepped ? 1.1 : undefined } } }
      });
    }

    // ====== ПОЛКИ ======
    async function renderShelves() {
      const container = document.getElementById('mainContent');
      container.innerHTML = '<div id="shelvesList"></div>';
      try {
        const data = await api('/api/plants');
        const plants = data.plants || [];
        document.getElementById('shelvesList').innerHTML = plants.length === 0
          ? '<div class="card">Нет растений</div>'
          : plants.map(p => `
            <div class="shelf-row">
              <div class="shelf-info">
                <div class="shelf-title">Полка №${p.position} (ID ${p.plant_id})</div>
                <div style="font-size:0.85rem;color:#666;">Обновлено: ${new Date(p.last_update).toLocaleString()}</div>
              </div>
              <span class="badge ${p.status === 'healthy' ? 'badge-success' : 'badge-danger'}">${p.status.toUpperCase()}</span>
            </div>
          `).join('');
      } catch (e) {
        container.innerHTML = '<div class="card">Раздел временно недоступен</div>';
        console.error(e);
      }
    }

    // ====== УПРАВЛЕНИЕ ======
    async function renderControl() {
      const container = document.getElementById('mainContent');
      container.innerHTML = '<div id="controlContent"></div>';
      await loadControlContent();
    }

    async function loadControlContent() {
      try {
        const [mode, relays] = await Promise.all([
          api('/api/command/mode'),
          api('/api/last_state')
        ]);
        let schedule = null;
        try { schedule = await api('/api/schedule'); } catch (e) {}

        const controlDiv = document.getElementById('controlContent');
        controlDiv.innerHTML = `
          <div class="dashboard-grid" style="margin-bottom:20px">
            <div class="card">
              <div class="card-header"><i class="fas fa-water"></i><h3>Уровень воды</h3></div>
              <div class="sensor-value">—</div>
            </div>
            <div class="card">
              <div class="card-header"><i class="fas fa-tint"></i><h3>Полив (текущее)</h3></div>
              <div class="sensor-value">${relays.water ? '🔵 ВКЛ' : '⚪ ВЫКЛ'}</div>
              <div>Режим: ${mode.mode === 'auto' ? 'Авто' : 'Ручной'}</div>
            </div>
            <div class="card">
              <div class="card-header"><i class="fas fa-lightbulb"></i><h3>Освещение (текущее)</h3></div>
              <div class="sensor-value">${relays.light ? '💡 ВКЛ' : '🌙 ВЫКЛ'}</div>
              <div>Режим: ${mode.mode === 'auto' ? 'Авто' : 'Ручной'}</div>
              <div><i class="fas fa-fan"></i> Вентилятор: ${relays.fan ? 'Вкл' : 'Выкл'}</div>
            </div>
          </div>
          <div class="controls-grid">
            <div class="card">
              <div class="card-header"><i class="fas fa-tint"></i><h3>Управление поливом</h3></div>
              <div class="manual-buttons">
                <button id="waterOnBtn" class="icon-btn" style="background:#7a9e3f; color:white"><i class="fas fa-play"></i> Включить</button>
                <button id="waterOffBtn" class="icon-btn" style="background:#e74c3c; color:white"><i class="fas fa-stop"></i> Выключить</button>
              </div>
              <div class="toggle-group">
                <div class="toggle-label"><i class="fas fa-water"></i> Автоматический режим</div>
                <label class="switch"><input type="checkbox" id="waterAutoToggle" ${mode.mode === 'auto' ? 'checked' : ''}><span class="slider"></span></label>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><i class="fas fa-lightbulb"></i><h3>Управление освещением</h3></div>
              <div class="manual-buttons">
                <button id="lightOnBtn" class="icon-btn" style="background:#7a9e3f; color:white"><i class="fas fa-play"></i> Включить</button>
                <button id="lightOffBtn" class="icon-btn" style="background:#e74c3c; color:white"><i class="fas fa-stop"></i> Выключить</button>
              </div>
              <div class="toggle-group">
                <div class="toggle-label"><i class="fas fa-sun"></i> Автоматический режим</div>
                <label class="switch"><input type="checkbox" id="lightAutoToggle" ${mode.mode === 'auto' ? 'checked' : ''}><span class="slider"></span></label>
              </div>
              <div class="toggle-group">
                <div class="toggle-label"><i class="fas fa-fan"></i> Вентилятор</div>
                <label class="switch"><input type="checkbox" id="fanToggle" ${relays.fan ? 'checked' : ''}><span class="slider"></span></label>
              </div>
            </div>
            <div class="card">
              <div class="card-header"><i class="fas fa-cog"></i><h3>Расписание</h3></div>
              ${schedule ? `
                <div class="schedule-item">
                  <span><i class="fas fa-lightbulb"></i> Свет</span>
                  <div class="time-inputs">
                    <input type="time" id="lightStart" value="${schedule.light.start}">
                    <span>–</span>
                    <input type="time" id="lightEnd" value="${schedule.light.end}">
                  </div>
                </div>
                <div class="schedule-item">
                  <span><i class="fas fa-tint"></i> Полив</span>
                  <div class="time-inputs">
                    <input type="number" id="waterInterval" value="${schedule.water.interval_hours}" min="1" style="width:60px;"> ч
                    <input type="number" id="waterDuration" value="${schedule.water.duration_minutes}" min="1" style="width:60px;"> мин
                  </div>
                </div>
                <button id="saveScheduleBtn" class="icon-btn" style="width:100%; margin-top:12px;"><i class="fas fa-save"></i> Сохранить</button>
              ` : '<p>Расписание недоступно</p>'}
            </div>
          </div>
        `;

        let currentMode = mode.mode;

        async function sendRelayCommand(device, state) {
          try {
            if (currentMode === 'auto') {
              // Сначала переключаемся в manual
              await api('/api/command/mode', 'POST', { token: TOKEN, mode: 'manual' });
              currentMode = 'manual';
              const w = document.getElementById('waterAutoToggle');
              const l = document.getElementById('lightAutoToggle');
              if (w) w.checked = false;
              if (l) l.checked = false;
            }
            // Отправляем команду на реле
            await api(`/api/command/${device}`, 'POST', { token: TOKEN, state });
          } catch (e) {
            alert(`Не удалось управлять ${device}: ${e.message}`);
          }
        }

        // Явно проверяем существование элементов перед привязкой
        const btnWaterOn = document.getElementById('waterOnBtn');
        const btnWaterOff = document.getElementById('waterOffBtn');
        const btnLightOn = document.getElementById('lightOnBtn');
        const btnLightOff = document.getElementById('lightOffBtn');
        if (btnWaterOn) btnWaterOn.addEventListener('click', () => sendRelayCommand('water', 'on'));
        if (btnWaterOff) btnWaterOff.addEventListener('click', () => sendRelayCommand('water', 'off'));
        if (btnLightOn) btnLightOn.addEventListener('click', () => sendRelayCommand('light', 'on'));
        if (btnLightOff) btnLightOff.addEventListener('click', () => sendRelayCommand('light', 'off'));

        const waterAutoToggle = document.getElementById('waterAutoToggle');
        const lightAutoToggle = document.getElementById('lightAutoToggle');
        const fanToggle = document.getElementById('fanToggle');

        if (waterAutoToggle) {
          waterAutoToggle.addEventListener('change', async function() {
            const newMode = this.checked ? 'auto' : 'manual';
            try {
              await api('/api/command/mode', 'POST', { token: TOKEN, mode: newMode });
              currentMode = newMode;
              if (lightAutoToggle) lightAutoToggle.checked = this.checked;
            } catch (e) {
              alert('Ошибка смены режима: ' + e.message);
              this.checked = !this.checked; // откатываем
            }
          });
        }

        if (lightAutoToggle) {
          lightAutoToggle.addEventListener('change', async function() {
            const newMode = this.checked ? 'auto' : 'manual';
            try {
              await api('/api/command/mode', 'POST', { token: TOKEN, mode: newMode });
              currentMode = newMode;
              if (waterAutoToggle) waterAutoToggle.checked = this.checked;
            } catch (e) {
              alert('Ошибка смены режима: ' + e.message);
              this.checked = !this.checked;
            }
          });
        }

        if (fanToggle) {
          fanToggle.addEventListener('change', async function() {
            const state = this.checked ? 'on' : 'off';
            try {
              await api('/api/command/fan', 'POST', { token: TOKEN, state });
            } catch (e) {
              alert('Ошибка управления вентилятором: ' + e.message);
              this.checked = !this.checked;
            }
          });
        }

        const saveBtn = document.getElementById('saveScheduleBtn');
        if (schedule && saveBtn) {
          saveBtn.addEventListener('click', async () => {
            const payload = {
              token: TOKEN,
              light: { start: document.getElementById('lightStart').value, end: document.getElementById('lightEnd').value },
              water: {
                interval_hours: Number(document.getElementById('waterInterval').value),
                duration_minutes: Number(document.getElementById('waterDuration').value)
              },
              fan: schedule.fan || { interval_hours: 2, duration_minutes: 5 }
            };
            try {
              await api('/api/schedule', 'POST', payload);
              alert('Расписание сохранено');
            } catch (e) {
              alert('Ошибка сохранения: ' + e.message);
            }
          });
        }
      } catch (e) {
        document.getElementById('controlContent').innerHTML = '<div class="card">Ошибка загрузки управления</div>';
        console.error(e);
      }
    }

    // ====== ЗАБОЛЕВАНИЯ ======
    async function renderDiseases() {
      const container = document.getElementById('mainContent');
      container.innerHTML = '<div id="diseasesContent"></div>';
      try {
        const [unhealthyRes, statusRes] = await Promise.all([
          api('/api/plants?status=unhealthy'),
          api('/api/plants/status')
        ]);
        const unhealthy = unhealthyRes.plants || [];
        let html = '';
        if (unhealthy.length === 0) {
          html = '<div class="card">✅ Все растения здоровы</div>';
        } else {
          unhealthy.forEach(plant => {
            const st = statusRes.plants?.find(p => p.plant_id === plant.plant_id);
            html += `
              <div class="card" style="border-left:4px solid #e74c3c; margin-bottom:12px;">
                <i class="fas fa-exclamation-triangle" style="color:#e74c3c"></i>
                Растение #${plant.plant_id} (полка ${plant.position}): ${st ? st.diagnosis : plant.status}
                (уверенность: ${st ? st.confidence : '—'})
                ${st?.photo_url ? `<br><img src="${st.photo_url}" style="max-width:120px;border-radius:8px;margin-top:8px;">` : ''}
                <button class="icon-btn make-photo-btn" data-plant-id="${plant.plant_id}"><i class="fas fa-camera"></i> Сделать фото</button>
              </div>
            `;
          });
        }
        document.getElementById('diseasesContent').innerHTML = html;

        document.querySelectorAll('.make-photo-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const plantId = btn.dataset.plantId;
            try {
              await api('/api/admin/make_photo', 'POST', { token: TOKEN, plant_id: plantId });
              alert('Фото сделано');
            } catch (e) { alert('Ошибка: ' + e.message); }
          });
        });
      } catch (e) {
        container.innerHTML = '<div class="card">Раздел временно недоступен</div>';
        console.error(e);
      }
    }

    function updateCameras() {
      document.getElementById('camerasGrid').innerHTML = `
        <div class="camera-card"><i class="fas fa-video"></i><div>Основная</div><img src="/api/stream" style="width:100%;height:100px;object-fit:cover;border-radius:8px;margin-top:8px;" onerror="this.alt='Нет сигнала'"></div>
        <div class="camera-card"><i class="fas fa-video"></i><div>Камера 2</div></div>
        <div class="camera-card"><i class="fas fa-video"></i><div>Камера 3</div></div>
        <div class="camera-card"><i class="fas fa-video"></i><div>Камера 4</div></div>
      `;
    }

    function renderSection(section) {
      if (section === 'dashboard') renderDashboard();
      else if (section === 'shelves') renderShelves();
      else if (section === 'control') renderControl();
      else if (section === 'diseases') renderDiseases();
    }

    setActiveSection('dashboard');
    updateCameras();

    setInterval(() => {
      if (activeSection === 'dashboard') loadDashboardData();
      else if (activeSection === 'control') loadControlContent();
    }, 10000);
  })();
</script>
</body>
</html>
